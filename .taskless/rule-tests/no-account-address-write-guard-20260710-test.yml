id: no-account-address-write-guard
valid:
  # Guards on the signing identity, not wagmi address.
  - "const f = async () => { if (signerStatus !== 'ready') return; await entity.attest(s); };"
  # Address guard but no attestation in the file (display-only usage).
  - "const f = () => { if (!address) return null; return address; };"
  # Attestation present but guarded on project, not address.
  - "const f = async () => { if (!project) return; await setupChainAndWallet({}); };"
  # Display-only Connect CTA (returns JSX) in a file that also attests elsewhere.
  - "const C = () => { const submit = async () => { await entity.attest(s); }; if (!address) return <Connect onClick={submit} />; return <button onClick={submit} />; };"
invalid:
  # `!address` early-return guard inside an attestation function.
  - "const f = async () => { if (!address) return; await setupChainAndWallet({}); };"
  # Compound `!address || !project` guard before an attest call.
  - "const f = async () => { if (!address || !project) { return; } await entity.attest(s); };"
