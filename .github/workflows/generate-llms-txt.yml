# NOTE: This workflow requires the FIRECRAWL_API_KEY secret to be configured
# in the repository settings (Settings → Secrets and variables → Actions).
# The key is currently only in Vercel — copy it from there or set it via:
#   gh secret set FIRECRAWL_API_KEY --repo <owner>/<repo>

name: Generate llms.txt

on:
  schedule:
    # Run on the 1st of each month at midnight UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  generate:
    name: Generate llms.txt files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate llms.txt files
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: pnpm run generate-llms

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/llms.txt public/llms-full.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: regenerate llms.txt files"
            git push
          fi
