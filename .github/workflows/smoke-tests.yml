name: Smoke Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to run smoke tests against'
        required: true
        default: 'https://staging.karmahq.xyz'
        type: string
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to run smoke tests against'
        required: true
        type: string

env:
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
  NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID }}
  NEXT_PUBLIC_GAP_INDEXER_URL: https://gapstagapi.karmahq.xyz

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-smoke-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-smoke-
            ${{ runner.os }}-nextjs-

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run smoke tests
        run: pnpm exec playwright test --config e2e/playwright.config.ts --project=chromium e2e/tests/smoke/
        env:
          CI: true
          BASE_URL: ${{ inputs.base_url || 'https://staging.karmahq.xyz' }}
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}

      - name: Upload smoke test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
          if-no-files-found: ignore
