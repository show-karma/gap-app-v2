name: QA Pipeline

on:
  workflow_run:
    workflows: ['Claude Code']
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run QA against'
        required: true
        type: string

jobs:
  gate-check:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      deployment_url: ${{ steps.check.outputs.deployment_url }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - name: Check review verdict and extract deployment URL
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManual = context.eventName === 'workflow_dispatch';

            // --- Resolve PR number and head SHA ---
            let headSha, prNumber;

            if (isManual) {
              prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              headSha = pr.head.sha;
              if (pr.draft) {
                console.log('PR is draft, skipping');
                core.setOutput('should_run', 'false');
                return;
              }
            } else {
              headSha = context.payload.workflow_run.head_sha;
              const headBranch = context.payload.workflow_run.head_branch;
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: 'open',
                head: `${owner}:${headBranch}`, per_page: 1
              });
              if (prs.length === 0) {
                console.log('No open PR found');
                core.setOutput('should_run', 'false');
                return;
              }
              const pr = prs[0];
              prNumber = pr.number;
              if (pr.draft) {
                console.log('PR is draft, skipping');
                core.setOutput('should_run', 'false');
                return;
              }
            }

            core.setOutput('head_sha', headSha);
            core.setOutput('pr_number', prNumber);

            // --- Check review verdict (poll for comment, skip for manual trigger) ---
            let comments;

            if (!isManual) {
              // Poll for the verdict comment — the Claude Code action may still be
              // posting it when workflow_run fires (race condition)
              let reviewComment = null;
              const maxAttempts = 12; // 12 × 15s = 3 min max wait

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const { data: allComments } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100
                });
                comments = allComments;

                reviewComment = [...allComments].reverse().find(c =>
                  (c.user.login === 'github-actions[bot]' || c.user.login.includes('claude') || c.user.login.includes('karma')) &&
                  (c.body.includes('APPROVE') || c.body.includes('REQUEST CHANGES'))
                );

                if (reviewComment) break;

                console.log('Waiting for review verdict... (' + attempt + '/' + maxAttempts + ')');
                await new Promise(r => setTimeout(r, 15000));
              }

              if (!reviewComment) {
                console.log('No Claude Code review verdict found after polling');
                core.setOutput('should_run', 'false');
                return;
              }

              const verdict = reviewComment.body;
              const isApproved = verdict.includes('✅') && (verdict.includes('APPROVE') && !verdict.includes('REQUEST CHANGES'));
              if (!isApproved) {
                console.log('Review verdict is REQUEST CHANGES — skipping QA');
                core.setOutput('should_run', 'false');
                return;
              }
              console.log('✅ Review approved');
            } else {
              console.log('Manual trigger — skipping verdict check');
              const { data: allComments } = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber, per_page: 100
              });
              comments = allComments;
            }

            // --- Extract Vercel deployment URL ---
            let deploymentUrl = '';

            try {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha: headSha, environment: 'Preview', per_page: 5
              });
              for (const d of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: d.id, per_page: 1
                });
                if (statuses.length > 0 && statuses[0].state === 'success') {
                  deploymentUrl = statuses[0].environment_url || statuses[0].target_url;
                  if (deploymentUrl) break;
                }
              }
            } catch (e) {
              console.log('Deployments API failed: ' + e.message);
            }

            if (!deploymentUrl) {
              const vercelComment = comments.find(c =>
                (c.user.login === 'vercel[bot]' || c.user.login === 'vercel') &&
                c.body.includes('vercel.app')
              );
              if (vercelComment) {
                const m = vercelComment.body.match(/https:\/\/[a-z0-9-]+\.vercel\.app/i);
                if (m) deploymentUrl = m[0];
              }
            }

            if (!deploymentUrl) {
              console.log('⚠️ No deployment URL found');
              core.setOutput('should_run', 'false');
              return;
            }

            // --- Health check ---
            let healthy = false;
            for (let i = 0; i < 12; i++) {
              try {
                const r = await fetch(deploymentUrl, { method: 'HEAD', redirect: 'follow' });
                if (r.ok || r.status === 308) { healthy = true; break; }
              } catch (e) {
                console.log('Health check ' + (i + 1) + ' failed');
              }
              await new Promise(r => setTimeout(r, 5000));
            }

            if (!healthy) {
              console.log('⚠️ Deployment not healthy');
              core.setOutput('should_run', 'false');
              return;
            }

            console.log('✅ Deployment ready: ' + deploymentUrl);
            core.setOutput('deployment_url', deploymentUrl);
            core.setOutput('should_run', 'true');

  qa-plan:
    needs: gate-check
    if: needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate QA Plan
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          PREVIEW_URL: ${{ needs.gate-check.outputs.deployment_url }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          claude --print --dangerously-skip-permissions \
            "You are a strict senior QA engineer. Read and follow the skill at .claude/skills/qa-plan-generator/SKILL.md exactly.
            PR number: $PR_NUMBER. Preview URL: $PREVIEW_URL.
            Generate a QA plan for this PR. Save to qa-plan.md.
            Then post the QA plan as a comment on PR #$PR_NUMBER using the GitHub CLI (gh pr comment $PR_NUMBER --body-file qa-plan-comment.md). Write the comment content to qa-plan-comment.md first, then use gh to post it.
            Be strict. Be concise. No fluff."
        timeout-minutes: 25

      - name: Upload QA plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-plan
          path: qa-plan.md
          retention-days: 7
          if-no-files-found: ignore

      - name: Update progress comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          PLAN_RESULT: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const planOk = process.env.PLAN_RESULT === 'success';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const pc = [...comments].reverse().find(c => c.body.includes('## QA Pipeline') && c.body.includes('QA Plan'));
            if (pc) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: pc.id,
                body: ['## QA Pipeline','','| Stage | Status |','|-------|--------|',
                  `| QA Plan | ${planOk ? '✅ Done' : '❌ Failed'} |`,
                  '| QA Execution | ⏳ Running... |','| Dogfood | ⏳ Waiting |','| Verdict | ⏳ Waiting |','',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
                ].join('\n') });
            }

  qa-execution:
    needs: [gate-check, qa-plan]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Download QA plan
        uses: actions/download-artifact@v4
        with:
          name: qa-plan

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Execute QA Plan
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          PREVIEW_URL: ${{ needs.gate-check.outputs.deployment_url }}
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          claude --print --dangerously-skip-permissions \
            "You are a strict senior QA executor. Read and follow the skill at .claude/skills/qa-executor/SKILL.md exactly.
            PR number: $PR_NUMBER. Preview URL: $PREVIEW_URL.
            QA Plan is at qa-plan.md. Execute ALL scenarios — both Public (P1, P2...) and Authenticated (A1, A2...).
            For authenticated scenarios, login using the Privy test account (email from QA_TEST_EMAIL env var, OTP from QA_TEST_OTP env var).
            Post the results as a comment on PR #$PR_NUMBER using gh pr comment.
            Save results to qa-results.json."
        timeout-minutes: 40

      - name: Upload QA execution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-execution-results
          path: |
            qa-output/
            qa-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Update progress comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          EXEC_RESULT: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const execOk = process.env.EXEC_RESULT === 'success';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const pc = [...comments].reverse().find(c => c.body.includes('## QA Pipeline') && c.body.includes('QA Plan'));
            if (pc) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: pc.id,
                body: ['## QA Pipeline','','| Stage | Status |','|-------|--------|',
                  '| QA Plan | ✅ Done |',
                  `| QA Execution | ${execOk ? '✅ Done' : '❌ Failed'} |`,
                  '| Dogfood | ⏳ Running... |','| Verdict | ⏳ Waiting |','',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
                ].join('\n') });
            }

  dogfood:
    needs: [gate-check, qa-execution]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Download QA plan for scope context
        uses: actions/download-artifact@v4
        with:
          name: qa-plan
        continue-on-error: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Dogfood Exploration
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          PREVIEW_URL: ${{ needs.gate-check.outputs.deployment_url }}
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          claude --print --dangerously-skip-permissions \
            "You are a strict senior QA engineer doing exploratory dogfood testing.
            PR number: $PR_NUMBER. Preview URL: $PREVIEW_URL.

            1. Read qa-plan.md (if available) to understand what areas changed.
            2. Run git diff origin/main...HEAD --name-only to know exactly which files this PR changed.
            3. Find and read the dogfood skill SKILL.md (search for it in the repo).
            4. Run BROADER exploratory testing around the changed feature areas — both public AND authenticated pages.
            5. For authenticated pages: login using the Privy test account (email from QA_TEST_EMAIL env var, OTP from QA_TEST_OTP env var). Save auth state and reuse.
            6. Follow the dogfood workflow: Initialize, Authenticate, Orient, Explore, Document.
            7. Find 5-10 well-documented issues with full repro evidence.

            CRITICAL — CLASSIFY EVERY ISSUE:
            For each issue found, classify it as either:
            - **PR-caused**: The issue is in code/pages that this PR changed, or is a direct consequence of the PR changes (e.g., broken test, missing state, regression).
            - **Pre-existing**: The issue exists on the main branch too — it is NOT caused by this PR. These are bugs that were already there.

            To determine: check if the affected file/component appears in the git diff. If not, it is pre-existing.

            ACTIONS:
            - PR-caused issues: Include in the PR comment. These block merge if Critical/High.
            - Pre-existing issues: Create a GitHub issue for each using 'gh issue create --title \"[QA] <title>\" --body \"<description>\" --label bug'. Do NOT include these in the blocking verdict.

            Post the results as a comment on PR #$PR_NUMBER using gh pr comment. Format:

            ## Dogfood (3/3)

            **PR-caused issues**: X found (Y critical, Z high)
            **Pre-existing issues**: N found (created as GitHub issues)

            ### PR-Caused (blocks merge if Critical/High)
            | # | Issue | Severity | Category |
            |---|-------|----------|----------|

            ### Pre-existing (filed as issues)
            | # | Issue | Severity | GitHub Issue |
            |---|-------|----------|-------------|

            **Verdict**: PASS or FAIL (based on PR-caused only)

            Save summary to dogfood-results.json. The 'critical' and 'high' counts must ONLY include PR-caused issues, NOT pre-existing ones:
            {\"total\":N,\"critical\":N,\"high\":N,\"medium\":N,\"low\":N,\"preexisting\":N,\"blocking\":bool}

            Be strict. Be thorough. No optimism."
        timeout-minutes: 55

      - name: Upload dogfood artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-results
          path: |
            dogfood-output/
            dogfood-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Update progress comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          DOGFOOD_RESULT: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const dogfoodOk = process.env.DOGFOOD_RESULT === 'success';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const pc = [...comments].reverse().find(c => c.body.includes('## QA Pipeline') && c.body.includes('QA Plan'));
            if (pc) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: pc.id,
                body: ['## QA Pipeline','','| Stage | Status |','|-------|--------|',
                  '| QA Plan | ✅ Done |','| QA Execution | ✅ Done |',
                  `| Dogfood | ${dogfoodOk ? '✅ Done' : '❌ Failed'} |`,
                  '| Verdict | ⏳ Evaluating... |','',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
                ].join('\n') });
            }

  verdict:
    needs: [gate-check, qa-execution, dogfood]
    if: always() && needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download QA results
        uses: actions/download-artifact@v4
        with:
          name: qa-execution-results
        continue-on-error: true

      - name: Download dogfood results
        uses: actions/download-artifact@v4
        with:
          name: dogfood-results
        continue-on-error: true

      - name: Evaluate and set commit status
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ needs.gate-check.outputs.head_sha }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          QA_EXEC_RESULT: ${{ needs.qa-execution.result }}
          DOGFOOD_RESULT: ${{ needs.dogfood.result }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.HEAD_SHA;
            const execResult = process.env.QA_EXEC_RESULT;
            const dogfoodResult = process.env.DOGFOOD_RESULT;

            // If qa-execution or dogfood FAILED (crashed/timed out), that's a failure
            // regardless of whether result files exist
            const jobsFailed = execResult === 'failure' || dogfoodResult === 'failure';

            let criticalCount = 0;
            let highCount = 0;

            try {
              const qaResults = JSON.parse(fs.readFileSync('qa-results.json', 'utf8'));
              for (const s of (qaResults.scenarios || [])) {
                if (s.result === 'FAIL') {
                  if (s.severity?.toLowerCase() === 'critical') criticalCount++;
                  if (s.severity?.toLowerCase() === 'high') highCount++;
                }
              }
            } catch (e) {
              console.log('Could not parse qa-results.json: ' + e.message);
            }

            try {
              const dogfoodResults = JSON.parse(fs.readFileSync('dogfood-results.json', 'utf8'));
              criticalCount += (dogfoodResults.critical || 0);
              highCount += (dogfoodResults.high || 0);
            } catch (e) {
              console.log('Could not parse dogfood-results.json: ' + e.message);
            }

            const hasBlockingIssues = criticalCount > 0 || highCount > 0 || jobsFailed;
            const state = hasBlockingIssues ? 'failure' : 'success';
            let description;
            if (jobsFailed) {
              const failed = [
                execResult === 'failure' ? 'QA Execution' : null,
                dogfoodResult === 'failure' ? 'Dogfood' : null
              ].filter(Boolean).join(', ');
              description = `${failed} failed — check workflow logs`;
            } else if (criticalCount > 0 || highCount > 0) {
              description = `${criticalCount} critical, ${highCount} high issues found`;
            } else {
              description = 'No critical/high issues found';
            }

            console.log(`Verdict: ${state} — ${description}`);

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state,
              description,
              context: 'qa-pipeline',
              target_url: `https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID}`
            });

            // Update progress comment with actual job results
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const icon = (r) => r === 'success' ? '✅ Done' : r === 'skipped' ? '⏭️ Skipped' : '❌ Failed';
            const verdictIcon = hasBlockingIssues ? '❌' : '✅';
            const verdictText = hasBlockingIssues ? `FAIL — ${description}` : 'PASS — no blocking issues';

            const { data: cmts } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100
            });
            const pc = [...cmts].reverse().find(c =>
              c.body.includes('## QA Pipeline') && c.body.includes('QA Plan')
            );
            if (pc) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: pc.id,
                body: [
                  '## QA Pipeline',
                  '',
                  '| Stage | Status |',
                  '|-------|--------|',
                  '| QA Plan | ✅ Done |',
                  `| QA Execution | ${icon(execResult)} |`,
                  `| Dogfood | ${icon(dogfoodResult)} |`,
                  `| **Verdict** | **${verdictIcon} ${verdictText}** |`,
                  '',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID})`
                ].join('\n')
              });
            }

            if (hasBlockingIssues) {
              core.setFailed(`QA Pipeline FAILED: ${description}`);
            }
