name: QA Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run QA against'
        required: true
        type: string

env:
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
  NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID }}
  NEXT_PUBLIC_GAP_INDEXER_URL: https://gapstagapi.karmahq.xyz

concurrency:
  group: qa-pipeline-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  gate-check:
    # For pull_request events: always run gate-check (we check Claude Code check-run inside).
    # For workflow_dispatch: always run.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - name: Check Claude Code verdict and PR state
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManual = context.eventName === 'workflow_dispatch';

            let headSha, prNumber;

            if (isManual) {
              prNumber = parseInt('${{ github.event.inputs.pr_number }}', 10);
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              headSha = pr.head.sha;
              if (pr.draft) {
                console.log('PR is draft, skipping');
                core.setOutput('should_run', 'false');
                return;
              }
            } else {
              // pull_request event — use event payload directly
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
              if (context.payload.pull_request.draft) {
                console.log('PR is draft, skipping');
                core.setOutput('should_run', 'false');
                return;
              }
            }

            core.setOutput('head_sha', headSha);
            core.setOutput('pr_number', prNumber);

            // For pull_request events: wait for the "Claude Code" check-run
            // on this commit to finish, then evaluate. We can't rely on
            // claude-completion to re-trigger QA — pull_request workflows
            // only fire on push events, not on workflow_run, and a cancelled
            // claude (e.g. via cancel-in-progress) re-triggers nothing.
            // So poll here instead with a generous timeout.
            if (!isManual) {
              const sleep = (ms) => new Promise(r => setTimeout(r, ms));
              const POLL_INTERVAL_MS = 30_000;
              const MAX_WAIT_MS = 15 * 60 * 1000; // 15 min; gate-check job timeout is 20 min
              const startedAt = Date.now();

              let proceed = false;
              while (true) {
                const { data: checkRuns } = await github.rest.checks.listForRef({
                  owner, repo, ref: headSha, per_page: 100
                });
                const claudeRuns = checkRuns.check_runs
                  .filter(r => r.name === 'Claude Code')
                  .sort((a, b) => new Date(b.started_at) - new Date(a.started_at));

                // Also fetch workflow runs as a fallback signal — claude
                // may be cancelled before publishing its check-run.
                const { data: wfRunsList } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, head_sha: headSha, per_page: 50
                });
                const claudeWfRuns = wfRunsList.workflow_runs.filter(r => r.name === 'Claude Code');

                const elapsedSec = Math.round((Date.now() - startedAt) / 1000);

                if (claudeRuns.length === 0 && claudeWfRuns.length === 0) {
                  // Nothing yet — give it a moment to register
                  if (Date.now() - startedAt > 2 * 60 * 1000) {
                    console.log(`No "Claude Code" check-run or workflow run after ${elapsedSec}s — proceeding without gating`);
                    proceed = true;
                    break;
                  }
                  console.log(`No "Claude Code" run yet (${elapsedSec}s elapsed) — waiting...`);
                  await sleep(POLL_INTERVAL_MS);
                  continue;
                }

                if (claudeRuns.length > 0) {
                  const latest = claudeRuns[0];
                  if (latest.status === 'completed') {
                    if (latest.conclusion === 'success') {
                      console.log(`✅ Claude Code check succeeded (after ${elapsedSec}s)`);
                      proceed = true;
                      break;
                    }
                    if (latest.conclusion === 'cancelled') {
                      console.log(`"Claude Code" check was cancelled (after ${elapsedSec}s) — proceeding (cancelled ≠ failed)`);
                      proceed = true;
                      break;
                    }
                    console.log(`"Claude Code" check concluded with ${latest.conclusion} — skipping QA`);
                    core.setOutput('should_run', 'false');
                    return;
                  }
                  console.log(`"Claude Code" check is ${latest.status} (${elapsedSec}s elapsed) — waiting...`);
                } else {
                  // No check-run, but a workflow exists — inspect it
                  const inProgress = claudeWfRuns.find(r => r.status !== 'completed');
                  if (!inProgress) {
                    const conclusions = claudeWfRuns.map(r => r.conclusion);
                    if (conclusions.every(c => c === 'cancelled')) {
                      console.log(`"Claude Code" workflow runs all cancelled (${claudeWfRuns.length}, after ${elapsedSec}s) — proceeding (cancelled ≠ failed)`);
                    } else {
                      console.log(`"Claude Code" workflow finished without publishing a check-run (conclusions: ${conclusions.join(', ')}) — proceeding`);
                    }
                    proceed = true;
                    break;
                  }
                  console.log(`"Claude Code" workflow is ${inProgress.status} (${elapsedSec}s elapsed) — waiting...`);
                }

                if (Date.now() - startedAt > MAX_WAIT_MS) {
                  console.log(`Timed out waiting for "Claude Code" after ${elapsedSec}s — proceeding without gating`);
                  proceed = true;
                  break;
                }

                await sleep(POLL_INTERVAL_MS);
              }

              if (!proceed) {
                core.setOutput('should_run', 'false');
                return;
              }

              // Additionally verify the PR-review verdict comment is APPROVE
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber, per_page: 100
              });

              const reviewComment = [...comments].reverse().find(c =>
                (c.user.login === 'github-actions[bot]' || c.user.login.includes('claude') || c.user.login.includes('karma')) &&
                (c.body.includes('APPROVE') || c.body.includes('REQUEST CHANGES'))
              );

              if (reviewComment) {
                const verdict = reviewComment.body;
                const isApproved = (verdict.includes('✅') || verdict.includes('⚠️')) && verdict.includes('APPROVE') && !verdict.includes('REQUEST CHANGES');
                if (!isApproved) {
                  console.log('Review verdict is REQUEST CHANGES — skipping QA');
                  core.setOutput('should_run', 'false');
                  return;
                }
                console.log('✅ Review approved');
              } else {
                console.log('No review verdict comment found — proceeding (Claude Code check was successful)');
              }
            } else {
              console.log('Manual trigger — skipping Claude Code check');
            }

            // Set pending commit status + post/update consolidated progress comment
            await github.rest.repos.createCommitStatus({
              owner, repo, sha: headSha,
              state: 'pending',
              description: 'QA Pipeline running — do not merge',
              context: 'qa-pipeline',
              target_url: `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

            const marker = '<!-- qa-pipeline-status -->';
            const progressBody = [
              marker,
              '## QA Pipeline',
              '',
              '| Stage | Status |',
              '|-------|--------|',
              '| QA Plan | ⏳ Running... |',
              '| Build | ⏳ Running... |',
              '| QA Execution | ⏳ Waiting |',
              '| Dogfood | ⏳ Waiting |',
              '| Verdict | ⏳ Waiting |',
              '',
              `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
            ].join('\n');

            // Find existing pipeline comment by marker; update or create.
            const { data: allComments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100
            });
            const existing = allComments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: progressBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: progressBody });
            }

            core.setOutput('should_run', 'true');

  qa-plan:
    needs: gate-check
    if: needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      public_count: ${{ steps.scenario-counts.outputs.public_count }}
      auth_count: ${{ steps.scenario-counts.outputs.auth_count }}
      shards: ${{ steps.scenario-counts.outputs.shards }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Compute diff fingerprint for cache key
        id: changed-files
        # Hash the actual diff CONTENT (not just file names) so two
        # commits that touch the same files but with different changes
        # don't collide. Same diff = same plan, regardless of SHA — wins
        # on rebases and force-pushes that re-apply identical changes.
        # Files written into $GITHUB_WORKSPACE so hashFiles() can read them.
        run: |
          git diff --name-only origin/main...HEAD | sort > .qa-plan-changed-files.txt
          git diff origin/main...HEAD > .qa-plan-diff-content.txt
          echo "Changed files:"
          cat .qa-plan-changed-files.txt
          echo "Diff size: $(wc -c < .qa-plan-diff-content.txt) bytes"

      - name: Cache QA plan output
        id: qa-plan-cache
        uses: actions/cache@v5
        with:
          path: qa-plan.md
          # No restore-keys: a stale plan from a different PR is worse
          # than re-generating. Only exact diff matches reuse the cache.
          key: qa-plan-${{ hashFiles('.qa-plan-diff-content.txt') }}

      - name: Generate GitHub App token
        if: steps.qa-plan-cache.outputs.cache-hit != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get ISO week for cache key
        if: steps.qa-plan-cache.outputs.cache-hit != 'true'
        id: weeknum
        run: echo "weeknum=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache Claude Code install
        if: steps.qa-plan-cache.outputs.cache-hit != 'true'
        id: claude-cache
        uses: actions/cache@v5
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}-${{ steps.weeknum.outputs.weeknum }}
          restore-keys: |
            claude-code-${{ runner.os }}-

      - name: Install Claude Code
        if: steps.qa-plan-cache.outputs.cache-hit != 'true' && steps.claude-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          npm install -g @anthropic-ai/claude-code

      - name: Add Claude Code to PATH
        if: steps.qa-plan-cache.outputs.cache-hit != 'true'
        run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Generate QA Plan
        if: steps.qa-plan-cache.outputs.cache-hit != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          claude --print --dangerously-skip-permissions \
            "You are a strict senior QA engineer. Read and follow the skill at .claude/skills/qa-plan-generator/SKILL.md exactly.
            PR number: $PR_NUMBER.
            Generate a QA plan for this PR. Save to qa-plan.md.
            Be strict. Be concise. No fluff."
        timeout-minutes: 15

      - name: Upload QA plan artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: qa-plan
          path: qa-plan.md
          retention-days: 7
          if-no-files-found: ignore

      - name: Count scenarios per shard
        id: scenario-counts
        # Count P-prefixed and A-prefixed table rows in the markdown plan.
        # Empty shards are skipped downstream so we don't waste runner minutes
        # spinning up a server only to write an empty results file.
        run: |
          if [ ! -f qa-plan.md ]; then
            echo "qa-plan.md missing — assuming both shards needed for safety"
            echo "public_count=1" >> "$GITHUB_OUTPUT"
            echo "auth_count=1" >> "$GITHUB_OUTPUT"
            echo 'shards=["public","auth"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Match lines like "| P1 |" or "| A12 |" — table data rows only.
          PUBLIC=$(grep -cE '^\| *P[0-9]+ *\|' qa-plan.md || true)
          AUTH=$(grep -cE '^\| *A[0-9]+ *\|' qa-plan.md || true)
          echo "public_count=$PUBLIC" >> "$GITHUB_OUTPUT"
          echo "auth_count=$AUTH" >> "$GITHUB_OUTPUT"
          # Always include at least one shard so qa-execution runs (and shows
          # green) instead of being skipped. The executor handles "no
          # scenarios in this shard" as a fast 0-scenario PASS (writes an
          # empty qa-results file and exits in <30s — see PR #1378's
          # public shard for a real example).
          #
          # Prefixes with 4+ scenarios are split into two round-robin
          # sub-shards (`public-1of2`, `public-2of2`, ...) — Claude execution
          # time is the pipeline's critical path and scales linearly with
          # scenario count, so halving the per-runner scenario load roughly
          # halves the tail. The qa-executor skill's "Sharded Execution"
          # section defines the `<prefix>-<k>of<n>` contract.
          SHARDS=$(python3 -c "
          import json
          shards = []
          for prefix, count in [('public', $PUBLIC), ('auth', $AUTH)]:
              if count >= 4:
                  shards += [f'{prefix}-1of2', f'{prefix}-2of2']
              elif count > 0:
                  shards.append(prefix)
          print(json.dumps(shards or ['public']))
          ")
          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "Public scenarios: $PUBLIC | Auth scenarios: $AUTH | Shards: $SHARDS"

      - name: Update progress comment (QA Plan done)
        if: always()
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          PLAN_RESULT: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const planOk = process.env.PLAN_RESULT === 'success';
            const marker = '<!-- qa-pipeline-status -->';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const pc = comments.find(c => c.body.includes(marker));
            if (pc) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: pc.id,
                body: [
                  marker,
                  '## QA Pipeline', '',
                  '| Stage | Status |', '|-------|--------|',
                  `| QA Plan | ${planOk ? '✅ Done' : '❌ Failed'} |`,
                  '| Build | ⏳ Running... |',
                  '| QA Execution | ⏳ Building & running... |',
                  '| Dogfood | ⏳ Building & running... |',
                  '| Verdict | ⏳ Waiting |', '',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
                ].join('\n') });
            }

  # Build the app ONCE and share with both qa-execution and dogfood via artifact.
  # Runs IN PARALLEL with qa-plan (qa-plan only reads source, doesn't need .next/)
  # so the build doesn't sit idle waiting for Claude to draft the plan.
  build:
    needs: [gate-check]
    if: needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          # Key on the lockfile so a restored cache is always compatible with
          # the current dependency graph; the SHA suffix keeps the freshest
          # cache per PR head while restore-keys fall back to the latest one.
          key: ${{ runner.os }}-nextjs-qa-${{ hashFiles('pnpm-lock.yaml') }}-${{ needs.gate-check.outputs.head_sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-qa-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-qa-
            ${{ runner.os }}-nextjs-

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Assemble standalone bundle
        # Next.js standalone output is self-contained (server.js + traced
        # node_modules) but doesn't auto-copy public/ or .next/static/ —
        # we stage them into the standalone tree so consumers boot with a
        # single `node .next/standalone/server.js` and no extra setup.
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - name: Pack standalone bundle into tarball
        # actions/upload-artifact@v5 rejects filenames containing `:` (NTFS
        # incompatibility). Next.js + Turbopack emits chunks like
        # `[externals]_node:inspector_*.js`, so uploading raw paths fails.
        # Packaging into a tarball sidesteps the per-file validator and
        # also keeps the artifact ~3-5× smaller than packing all of .next/.
        run: tar --zstd -cf next-build.tar.zst .next/standalone

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: qa-build
          path: next-build.tar.zst
          retention-days: 1
          if-no-files-found: error

      - name: Update progress comment (Build done)
        if: always()
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          BUILD_RESULT: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const buildOk = process.env.BUILD_RESULT === 'success';
            const marker = '<!-- qa-pipeline-status -->';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const pc = comments.find(c => c.body.includes(marker));
            if (pc) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: pc.id,
                body: [
                  marker,
                  '## QA Pipeline', '',
                  '| Stage | Status |', '|-------|--------|',
                  '| QA Plan | ✅ Done |',
                  `| Build | ${buildOk ? '✅ Done' : '❌ Failed'} |`,
                  `| QA Execution | ${buildOk ? '⏳ Running...' : '⏭️ Skipped (build failed)'} |`,
                  `| Dogfood | ${buildOk ? '⏳ Running...' : '⏭️ Skipped (build failed)'} |`,
                  '| Verdict | ⏳ Waiting |', '',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID})`
                ].join('\n') });
            }

  # qa-execution and dogfood run IN PARALLEL after the shared build,
  # each downloading the prebuilt .next/ artifact instead of rebuilding.

  # Sharded QA execution: split scenarios across parallel jobs to roughly
  # halve wall time. The `public` shard runs P-prefixed scenarios with no
  # auth (fastest); the `auth` shard runs A-prefixed scenarios after Privy
  # login. Each shard reads $SHARD_ID and self-filters via the qa-executor
  # skill. Each uploads `qa-results-<shard>.json`; the verdict job
  # aggregates by globbing all shards.
  qa-execution:
    needs: [gate-check, qa-plan, build]
    runs-on: ubuntu-latest
    # 18 min covers: setup (~3m) + single 14m claude attempt + cleanup (~1m).
    # Single attempt only — retrying a hung claude on the same prompt almost
    # always re-hangs and wastes another 14m. Better to fail fast and let the
    # author re-run the workflow if needed.
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        # Dynamically computed by qa-plan from actual scenario counts.
        # Empty shards are excluded — no point spinning up a server for nothing.
        shard: ${{ fromJSON(needs.qa-plan.outputs.shards) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Download QA plan
        uses: actions/download-artifact@v7
        with:
          name: qa-plan

      - name: Detect scenario count for this shard
        id: shard-count
        # Count rows for THIS shard's prefix in the markdown plan. If zero,
        # subsequent steps short-circuit — we still want a green job, but
        # there's nothing to spin up a browser for.
        run: |
          # Shard names are `public`/`auth` or split forms like `auth-2of2`.
          case "${{ matrix.shard }}" in auth*) PREFIX=A ;; *) PREFIX=P ;; esac
          if [ -f qa-plan.md ]; then
            COUNT=$(grep -cE "^\| *${PREFIX}[0-9]+ *\|" qa-plan.md || true)
          else
            COUNT=0
          fi
          echo "shard_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Shard ${{ matrix.shard }} has $COUNT scenarios"

      - name: Write no-op results when shard has zero scenarios
        if: steps.shard-count.outputs.shard_count == '0'
        run: |
          mkdir -p qa-output
          cat > "qa-results-${{ matrix.shard }}.json" <<'JSON'
          { "total": 0, "passed": 0, "failed": 0, "blocked": 0, "skipped": 0, "blocking": false, "scenarios": [], "note": "No scenarios in this shard" }
          JSON
          echo "Wrote no-op qa-results-${{ matrix.shard }}.json"

      # All heavy steps below are gated on a non-zero scenario count.

      - name: Setup pnpm
        if: steps.shard-count.outputs.shard_count != '0'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.shard-count.outputs.shard_count != '0'
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      # No `pnpm install` here: the standalone bundle ships its own
      # pruned node_modules for the server, and Claude Code is provided
      # by the npm-cached global install below. Saves ~30-60s per shard.

      - name: Download prebuilt .next
        if: steps.shard-count.outputs.shard_count != '0'
        uses: actions/download-artifact@v7
        with:
          name: qa-build

      - name: Unpack standalone bundle
        if: steps.shard-count.outputs.shard_count != '0'
        run: tar --zstd -xf next-build.tar.zst

      - name: Start local server
        if: steps.shard-count.outputs.shard_count != '0'
        # Standalone server.js boots in ~2s and embeds its own pruned
        # node_modules — no `pnpm start` / `next start` needed. HOSTNAME
        # must be 0.0.0.0 so curl on localhost can reach it.
        run: node .next/standalone/server.js &
        env:
          PORT: 3000
          HOSTNAME: 0.0.0.0
          NODE_ENV: production

      - name: Wait for server
        if: steps.shard-count.outputs.shard_count != '0'
        run: |
          start=$SECONDS
          for i in $(seq 1 60); do
            if curl --silent --fail --max-time 2 http://localhost:3000/ >/dev/null 2>&1; then
              echo "Server is up after $((SECONDS - start))s (attempt ${i})"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within $((SECONDS - start))s (60 attempts)"
          exit 1

      - name: Generate GitHub App token
        if: steps.shard-count.outputs.shard_count != '0'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get ISO week for cache key
        if: steps.shard-count.outputs.shard_count != '0'
        id: weeknum
        run: echo "weeknum=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache Claude Code install
        if: steps.shard-count.outputs.shard_count != '0'
        id: claude-cache
        uses: actions/cache@v5
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}-${{ steps.weeknum.outputs.weeknum }}
          restore-keys: |
            claude-code-${{ runner.os }}-

      - name: Install Claude Code
        if: steps.shard-count.outputs.shard_count != '0' && steps.claude-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          npm install -g @anthropic-ai/claude-code

      - name: Add Claude Code to PATH
        if: steps.shard-count.outputs.shard_count != '0'
        run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Cache agent-browser Chromium
        if: steps.shard-count.outputs.shard_count != '0'
        id: ab-browser-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: agent-browser-chromium-${{ runner.os }}-${{ steps.weeknum.outputs.weeknum }}
          restore-keys: |
            agent-browser-chromium-${{ runner.os }}-

      - name: Install agent-browser (browser driver for QA executor)
        if: steps.shard-count.outputs.shard_count != '0'
        # The qa-executor skill drives the app through `agent-browser`. Without
        # it every browser scenario is BLOCKED — or hard-fails the shard when
        # the agent produces no results file. Installed into the same
        # ~/.npm-global prefix as Claude Code (already on PATH). Chromium is
        # restored from the cache above; `--with-deps` only (re)installs the
        # system libraries it needs.
        run: |
          npm config set prefix ~/.npm-global
          if ! "$HOME/.npm-global/bin/agent-browser" --version >/dev/null 2>&1; then
            npm install -g agent-browser
          fi
          "$HOME/.npm-global/bin/agent-browser" install --with-deps

      - name: Execute QA Plan (shard ${{ matrix.shard }})
        if: steps.shard-count.outputs.shard_count != '0'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SHARD_ID: ${{ matrix.shard }}
        run: |
          set +e -uo pipefail
          mkdir -p qa-output
          PROMPT="You are a strict senior QA executor. Read and follow the skill at .claude/skills/qa-executor/SKILL.md exactly.
          PR #$PR_NUMBER. Target: http://localhost:3000 (always — never a preview/vercel URL).
          SHARD_ID=$SHARD_ID — execute ONLY scenarios in this shard per the skill's 'Sharded Execution' section.
            - SHARD_ID starting with 'public': P-prefixed scenarios. Skip Privy login entirely.
            - SHARD_ID starting with 'auth': A-prefixed scenarios. Login first, then execute.
            - Split form '<prefix>-<k>of<n>' (e.g. auth-2of2): of the prefix's scenarios ordered by number, run only those at positions k, k+n, k+2n, ... (1-based round-robin).
          QA Plan is at qa-plan.md.
          For authenticated scenarios, login with QA_TEST_EMAIL + QA_TEST_OTP env vars.
          Apply the skill's 'Speed Rules' strictly — targeted waits, no networkidle after in-page actions.
          CRITICAL: Follow the skill's 'Time Budget & Incremental Writes' section. Write qa-results-\$SHARD_ID.json after EVERY completed scenario (upsert via heredoc). Per-scenario soft cap: 90s. Stop starting new scenarios when <2 minutes remain.
          Do NOT post a separate PR comment — results will be aggregated in the pipeline verdict comment."

          echo "claude version:"
          claude --version || echo "(claude --version failed)"

          # Heartbeat: claude --print buffers stdout/stderr until exit, so
          # without this we'd see ZERO output for up to 14 minutes before a
          # SIGKILL with no clue where it hung. The heartbeat survives in
          # the runner log even if the child's buffered output is lost.
          (
            while true; do
              echo "::notice::heartbeat $(date -u +%H:%M:%S) shard=$SHARD_ID"
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!
          trap 'kill $HEARTBEAT_PID 2>/dev/null || true' EXIT

          # SIGTERM first (10s grace) so claude can flush buffered output and
          # finish any in-progress qa-results write before being SIGKILLed.
          # `--debug` stderr is teed to a file so it survives the kill and
          # uploads with the artifact, even when the buffered stdout is lost.
          rc=0
          timeout --kill-after=10s --signal=TERM 14m \
            stdbuf -oL -eL \
            claude --print --debug --dangerously-skip-permissions "$PROMPT" \
            > qa-output/claude-stdout-${SHARD_ID}.log \
            2> qa-output/claude-stderr-${SHARD_ID}.log \
            || rc=$?

          echo "claude exit: $rc"
          echo "--- last 80 lines of stderr (--debug) ---"
          tail -n 80 "qa-output/claude-stderr-${SHARD_ID}.log" || true
          echo "--- last 40 lines of stdout ---"
          tail -n 40 "qa-output/claude-stdout-${SHARD_ID}.log" || true

          # Skill writes qa-results-${SHARD_ID}.json incrementally. If the
          # file exists with at least one scenario, this shard contributed
          # data — count it as success and let verdict aggregate.
          if [ -s "qa-results-${SHARD_ID}.json" ]; then
            echo "qa-results-${SHARD_ID}.json present ($(wc -c < qa-results-${SHARD_ID}.json) bytes) — shard complete"
            exit 0
          fi

          # No results file means the agent never completed: it hung and hit the
          # timeout (rc 124/137) or exited without writing. That is an agent
          # INFRA failure, not a QA finding — the scenarios in this shard simply
          # did not run. Hard-failing here makes the QA gate permanently red on
          # an intermittent agent hang (it alternates shards run to run), so
          # degrade to a NON-BLOCKING blocked result and let the verdict
          # aggregate it. The warning keeps the missed coverage visible; a
          # re-run re-attempts the shard. Real critical/high findings still come
          # from shards that DO complete and write blocking scenarios.
          if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
            reason="claude hung and was killed by the 14-minute timeout"
          elif [ "$rc" -eq 0 ]; then
            reason="claude exited 0 without writing results"
          else
            reason="claude exited $rc without writing results"
          fi
          echo "::warning::QA shard ${SHARD_ID} did not complete (${reason}); recording it as non-blocking BLOCKED. Re-run the workflow to re-attempt this shard."
          cat > "qa-results-${SHARD_ID}.json" <<JSON
          { "total": 0, "passed": 0, "failed": 0, "blocked": 1, "skipped": 0, "blocking": false, "scenarios": [], "note": "Agent did not complete for shard ${SHARD_ID} (${reason}); scenarios not executed — non-blocking infra timeout." }
          JSON
          exit 0
        timeout-minutes: 16

      - name: Upload QA execution artifacts (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: qa-execution-results-${{ matrix.shard }}
          path: |
            qa-output/
            qa-results-${{ matrix.shard }}.json
          retention-days: 7
          # `error` (not `ignore`) so we notice if a hung claude produced
          # genuinely no output — qa-output/ should always have at least
          # the captured stdout/stderr logs.
          if-no-files-found: warn

  # dogfood-plan: compute changed UI pages and bucket them into shards.
  # Runs after qa-plan (to reuse the checkout + diff already done for QA plan)
  # and in parallel with build (it only inspects file paths, not the build).
  # Emits dogfood-plan.json: { should_run, shard_count, groups: [["/a"], ["/b"]] }
  dogfood-plan:
    needs: [gate-check, qa-plan]
    if: needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Compute dogfood page scope
        id: plan
        run: |
          # Find changed UI files that map to navigable pages.
          # We include page.tsx / layout.tsx (direct route files) and
          # feature/component TSX files (they may affect multiple pages,
          # so we emit the changed-file list and let the agent figure out
          # the precise URLs during exploration).
          # Note: the leading app/ entries cover the root page.tsx / layout.tsx
          # (e.g. app/page.tsx — the landing page). The recursive 'app/**/page.tsx'
          # pathspec does NOT match those because '**' requires at least one
          # intermediate path segment.
          CHANGED=$(git diff --name-only origin/main...HEAD -- \
            'app/page.tsx' \
            'app/layout.tsx' \
            'app/**/page.tsx' \
            'app/**/layout.tsx' \
            'src/features/**/*.tsx' \
            'components/**/*.tsx' 2>/dev/null || true)

          # Derive URL paths from app/*/page.tsx paths.
          # For feature/component changes we can't deterministically map to
          # a single URL, so we emit the file paths and let the dogfood agent
          # resolve them. The agent is instructed to derive the affected pages
          # from the file context.
          declare -a PATHS=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [[ "$f" == app/**/page.tsx ]] || [[ "$f" =~ ^app/.*page\.tsx$ ]]; then
              # Convert app/some/route/page.tsx -> /some/route
              route=$(echo "$f" | sed 's|^app/||; s|/page\.tsx$||; s|^$|/|')
              # Strip route-group parens e.g. (with-header) -> drop segment
              route=$(echo "$route" | sed 's|([^)]*)/||g; s|(.*)||g')
              [ -z "$route" ] && route="/"
              PATHS+=("/$route")
            else
              # For components/features, emit the file path prefixed with "file:"
              # so the agent knows to resolve URLs from context.
              PATHS+=("file:$f")
            fi
          done <<< "$CHANGED"

          TOTAL=${#PATHS[@]}
          echo "Total changed UI items: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            # No UI changes — emit an empty no-op shard so dogfood runs and
            # shows green instead of skipped. The dogfood agent treats an
            # empty SCOPE_PAGES as "nothing to explore", writes a 0-finding
            # results file, and exits in <30s.
            echo "No changed UI pages — emitting no-op shard so the job stays green"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo 'shards=["1"]' >> "$GITHUB_OUTPUT"
            echo '{"should_run":true,"shard_count":1,"groups":[[]]}' > dogfood-plan.json
          elif [ "$TOTAL" -le 2 ]; then
            # Tiny diff — single shard, no splitting overhead
            GROUP_A=$(printf '%s,' "${PATHS[@]}" | sed 's/,$//')
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo 'shards=["1"]' >> "$GITHUB_OUTPUT"
            python3 -c "
          import json
          paths = '${GROUP_A}'.split(',')
          print(json.dumps({'should_run': True, 'shard_count': 1, 'groups': [paths]}))
          " > dogfood-plan.json
          else
            # Split into round-robin groups: 2 shards for medium diffs,
            # 4 for large ones. Each shard's Claude exploration time scales
            # with its page count, so wider fan-out directly cuts the tail
            # (the runners are mostly idle waiting on the model anyway).
            if [ "$TOTAL" -le 6 ]; then NSHARDS=2; else NSHARDS=4; fi
            printf '%s\n' "${PATHS[@]}" > .dogfood-paths.txt
            python3 -c "
          import json
          n = $NSHARDS
          paths = [l for l in open('.dogfood-paths.txt').read().splitlines() if l]
          groups = [paths[i::n] for i in range(n)]
          print(json.dumps({'should_run': True, 'shard_count': n, 'groups': groups}))
          " > dogfood-plan.json
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "shards=$(python3 -c "import json; print(json.dumps([str(i+1) for i in range($NSHARDS)]))")" >> "$GITHUB_OUTPUT"
          fi

          echo "dogfood-plan.json contents:"
          cat dogfood-plan.json

      - name: Upload dogfood plan artifact
        uses: actions/upload-artifact@v5
        with:
          name: dogfood-plan
          path: dogfood-plan.json
          retention-days: 1
          if-no-files-found: error

  # dogfood-auth-prep: log into Privy ONCE and dump the storage state so
  # every dogfood shard starts authenticated. Without this each shard
  # was spending 60-120s on the OTP flow, which made the 7-minute budget
  # unreachable on shards that touch /oauth/consent or other auth pages.
  # Reuses the existing e2e/tests/auth.setup.ts so the login flow is
  # the same one verified by the smoke + qa-execution suites.
  dogfood-auth-prep:
    needs: [gate-check, build, dogfood-plan]
    if: needs.gate-check.outputs.should_run == 'true' && needs.dogfood-plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Download prebuilt .next
        uses: actions/download-artifact@v7
        with:
          name: qa-build

      - name: Unpack standalone bundle
        run: tar --zstd -xf next-build.tar.zst

      - name: Start local server
        run: node .next/standalone/server.js &
        env:
          PORT: 3000
          HOSTNAME: 0.0.0.0
          NODE_ENV: production

      - name: Wait for server
        run: |
          start=$SECONDS
          for i in $(seq 1 60); do
            if curl --silent --fail --max-time 2 http://localhost:3000/ >/dev/null 2>&1; then
              echo "Server is up after $((SECONDS - start))s (attempt ${i})"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within $((SECONDS - start))s"
          exit 1

      # Persist the Privy storage state across pipeline runs. auth.setup.ts
      # probes the cached session first and only does the OTP email flow if
      # it has expired — Privy throttles OTP sends per address, and logging
      # in fresh on every pipeline run was the root cause of flaky
      # dogfood-auth-prep failures. Daily key + restore-keys means at most
      # ~one OTP send per day instead of one per run.
      - name: Get date for auth-state cache key
        id: authdate
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache Privy auth state
        uses: actions/cache@v5
        with:
          path: e2e/.auth/user.json
          key: privy-auth-state-${{ steps.authdate.outputs.date }}
          restore-keys: |
            privy-auth-state-

      - name: Run Privy auth setup
        env:
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}
          CI: 'true'
        run: pnpm exec playwright test --config=e2e/playwright.config.ts --project=setup

      # When the Privy login hangs, the screenshots + Playwright trace are the
      # only way to see where. The setup project retains a trace on failure;
      # surface it (and the HTML report) as an artifact for diagnosis.
      - name: Upload auth setup trace on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: dogfood-auth-prep-trace
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 3
          if-no-files-found: ignore

      - name: Verify storage state was saved
        run: |
          if [ ! -s e2e/.auth/user.json ]; then
            echo "::error::Privy auth setup did not produce e2e/.auth/user.json"
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('e2e/.auth/user.json') as f: s = json.load(f)
          has_cookies = bool(s.get('cookies'))
          has_origins = bool(s.get('origins'))
          if not (has_cookies or has_origins):
              print('storage state has neither cookies nor origins', file=sys.stderr)
              sys.exit(1)
          print(f'storage state OK: cookies={len(s.get(\"cookies\", []))} origins={len(s.get(\"origins\", []))}')
          "

      - name: Upload auth state artifact
        uses: actions/upload-artifact@v5
        with:
          name: dogfood-auth-state
          path: e2e/.auth/user.json
          retention-days: 1
          if-no-files-found: error

  # Sharded dogfood exploration: each shard explores its assigned pages,
  # writes findings to dogfood-findings-{shard}.json (NO issue filing),
  # and uploads the artifact. The dogfood-aggregate job dedupes and files.
  dogfood:
    needs: [gate-check, build, dogfood-plan, dogfood-auth-prep]
    if: needs.gate-check.outputs.should_run == 'true' && needs.dogfood-plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # Hard cap is 12 min — the agent is told to wrap up at 6 min and
    # hard-stop at 7 min (BUDGET_S=420). Slack covers download/server
    # start before the agent runs.
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.dogfood-plan.outputs.shards) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.gate-check.outputs.head_sha }}

      - name: Download dogfood plan
        uses: actions/download-artifact@v7
        with:
          name: dogfood-plan

      - name: Extract page scope for this shard
        id: scope
        run: |
          SHARD_INDEX=$(( ${{ matrix.shard }} - 1 ))
          # Extract the pages assigned to this shard from dogfood-plan.json
          PAGES=$(python3 -c "
          import json, sys
          with open('dogfood-plan.json') as f:
              plan = json.load(f)
          groups = plan.get('groups', [])
          idx = $SHARD_INDEX
          if idx < len(groups):
              print(','.join(groups[idx]))
          else:
              print('')
          ")
          echo "scope_pages=$PAGES" >> "$GITHUB_OUTPUT"
          echo "Shard ${{ matrix.shard }} scope: $PAGES"

      - name: Write no-op artifacts when scope is empty
        # CI/docs PRs have no changed UI files. We still want this job to be
        # green, so emit a 0-finding results file here and skip all the
        # heavy setup (build download, server boot, claude run) below.
        if: steps.scope.outputs.scope_pages == ''
        run: |
          mkdir -p dogfood-output
          echo "Empty scope — writing no-op dogfood-findings-${{ matrix.shard }}.json"
          cat > dogfood-findings-${{ matrix.shard }}.json <<'JSON'
          { "findings": [], "scope_pages": "", "note": "No changed UI pages — no-op shard" }
          JSON
          cat > dogfood-results.json <<'JSON'
          { "total": 0, "critical": 0, "high": 0, "medium": 0, "low": 0, "preexisting": 0, "blocking": false }
          JSON

      # All steps below are gated on a non-empty scope. Empty-scope shards
      # (CI/docs PRs) short-circuit at the no-op step above with their
      # results files already written, and skip the heavy build/server/
      # claude setup. Each step's `if:` keeps the JOB green by leaving
      # the step status as "skipped" rather than "failure".

      - name: Setup pnpm
        if: steps.scope.outputs.scope_pages != ''
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.scope.outputs.scope_pages != ''
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      # No `pnpm install` here: the standalone bundle ships its own
      # pruned node_modules for the server, and Claude Code is provided
      # by the npm-cached global install below. Saves ~30-60s per shard.

      - name: Download prebuilt .next
        if: steps.scope.outputs.scope_pages != ''
        uses: actions/download-artifact@v7
        with:
          name: qa-build

      - name: Unpack standalone bundle
        if: steps.scope.outputs.scope_pages != ''
        run: tar --zstd -xf next-build.tar.zst

      - name: Start local server
        if: steps.scope.outputs.scope_pages != ''
        # Standalone server.js boots in ~2s and embeds its own pruned
        # node_modules — no `pnpm start` / `next start` needed. HOSTNAME
        # must be 0.0.0.0 so curl on localhost can reach it.
        run: node .next/standalone/server.js &
        env:
          PORT: 3000
          HOSTNAME: 0.0.0.0
          NODE_ENV: production

      - name: Wait for server
        if: steps.scope.outputs.scope_pages != ''
        run: |
          start=$SECONDS
          for i in $(seq 1 60); do
            if curl --silent --fail --max-time 2 http://localhost:3000/ >/dev/null 2>&1; then
              echo "Server is up after $((SECONDS - start))s (attempt ${i})"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within $((SECONDS - start))s (60 attempts)"
          exit 1

      - name: Download Privy auth state
        if: steps.scope.outputs.scope_pages != ''
        uses: actions/download-artifact@v7
        with:
          name: dogfood-auth-state
          path: dogfood-auth/
        continue-on-error: true

      - name: Verify auth state present
        if: steps.scope.outputs.scope_pages != ''
        id: auth
        run: |
          if [ -s dogfood-auth/user.json ]; then
            echo "auth_state_path=$(pwd)/dogfood-auth/user.json" >> "$GITHUB_OUTPUT"
            echo "Auth state available at $(pwd)/dogfood-auth/user.json"
          else
            # Don't fail the shard — the agent has a fallback path that
            # logs in inline if the state file is missing. Slower but safe.
            echo "auth_state_path=" >> "$GITHUB_OUTPUT"
            echo "::warning::No pre-cached auth state — shard will log in inline (slower)"
          fi

      - name: Generate GitHub App token
        if: steps.scope.outputs.scope_pages != ''
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get ISO week for cache key
        if: steps.scope.outputs.scope_pages != ''
        id: weeknum
        run: echo "weeknum=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache Claude Code install
        if: steps.scope.outputs.scope_pages != ''
        id: claude-cache
        uses: actions/cache@v5
        with:
          path: ~/.npm-global
          key: claude-code-${{ runner.os }}-${{ steps.weeknum.outputs.weeknum }}
          restore-keys: |
            claude-code-${{ runner.os }}-

      - name: Install Claude Code
        if: steps.scope.outputs.scope_pages != '' && steps.claude-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          npm install -g @anthropic-ai/claude-code

      - name: Add Claude Code to PATH
        if: steps.scope.outputs.scope_pages != ''
        run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Cache agent-browser Chromium
        if: steps.scope.outputs.scope_pages != ''
        id: ab-browser-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: agent-browser-chromium-${{ runner.os }}-${{ steps.weeknum.outputs.weeknum }}
          restore-keys: |
            agent-browser-chromium-${{ runner.os }}-

      - name: Install agent-browser (browser driver for dogfood)
        if: steps.scope.outputs.scope_pages != ''
        # The dogfood skill drives the app through `agent-browser`; without it
        # every exploration step fails. Installed into the same ~/.npm-global
        # prefix as Claude Code (already on PATH). Chromium is restored from the
        # cache above; `--with-deps` only (re)installs the system libraries.
        run: |
          npm config set prefix ~/.npm-global
          if ! "$HOME/.npm-global/bin/agent-browser" --version >/dev/null 2>&1; then
            npm install -g agent-browser
          fi
          "$HOME/.npm-global/bin/agent-browser" install --with-deps

      - name: Run Dogfood Exploration (shard ${{ matrix.shard }})
        if: steps.scope.outputs.scope_pages != ''
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_OTP: ${{ secrets.QA_TEST_OTP }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SHARD_ID: ${{ matrix.shard }}
          SCOPE_PAGES: ${{ steps.scope.outputs.scope_pages }}
          AUTH_STATE_PATH: ${{ steps.auth.outputs.auth_state_path }}
          BUDGET_S: '420'
        run: |
          # Record start time so the agent can enforce its own wall-clock
          # budget. The agent re-reads this and computes elapsed before
          # every tool call.
          START_TS=$(date +%s)
          export START_TS
          claude --print --dangerously-skip-permissions \
            "You are a strict senior QA engineer doing focused exploratory dogfood testing.
            PR #$PR_NUMBER. Target: http://localhost:3000 (always — never a preview/vercel URL).
            SHARD_ID=$SHARD_ID. SCOPE_PAGES=$SCOPE_PAGES.
            AUTH_STATE_PATH=$AUTH_STATE_PATH (may be empty).
            START_TS=$START_TS  BUDGET_S=$BUDGET_S.

            === HARD TIME ENFORCEMENT (non-negotiable) ===
            Before EVERY tool call, compute elapsed = \$(date +%s) - $START_TS.
            - If elapsed >= 360s (6 min), stop exploration immediately and write findings/results JSON.
            - If elapsed >= 420s (7 min), abort even mid-step. Write whatever findings you have, including 0.
            - The wrapper kills the step at 12 min. Do NOT rely on that — write your JSON before 7 min.
            Producing fewer findings on time is correct. Producing more findings late is a failure.

            === AUTH (DO NOT LOG IN UNLESS NECESSARY) ===
            If AUTH_STATE_PATH is non-empty, the test account is ALREADY authenticated.
            FIRST agent-browser command (before any navigation):
              agent-browser --session dogfood-\$SHARD_ID state load \"\$AUTH_STATE_PATH\"
            Then open the target URL. Do NOT visit the Privy login modal. Do NOT submit email/OTP.
            ONLY if 'state load' fails AND a scoped page requires auth, fall back to email+OTP login
            (email=\$QA_TEST_EMAIL, OTP=\$QA_TEST_OTP). Public pages never need login.

            === SCOPE CAPS (per shard) ===
            - Max 2 URLs visited (pick the highest-risk ones from SCOPE_PAGES).
            - Max 1 screenshot per URL (no per-step screenshots in shard mode).
            - Max 2 interactions per URL (click/fill/submit).
            - Max 3 findings reported. Stop when you reach 3.

            Read and follow the skill at .claude/skills/dogfood/SKILL.md. You are running in CI SHARD MODE
            because SCOPE_PAGES is set. Key rules:
            1. Explore ONLY the pages listed in SCOPE_PAGES (comma-separated paths). For 'file:' prefixed
               entries, infer the SINGLE most likely URL the component affects and visit that.
            2. On each page: load via state, take ONE screenshot, scan console errors, interact briefly.
            3. Do NOT repeat scenarios already covered by qa-plan.md (if present).
            4. CLASSIFY EVERY ISSUE: 'pr-caused' (file in git diff) or 'pre-existing' (not in diff).
            5. Do NOT call 'gh issue create'. Write findings to dogfood-findings-\$SHARD_ID.json per the
               skill's CI Pipeline Mode schema (includes fingerprint field).
            6. Also write dogfood-results.json: {\"total\":N,\"critical\":N,\"high\":N,\"medium\":N,\"low\":N,\"preexisting\":N,\"blocking\":bool}
               where critical/high counts = PR-caused only.
            7. Do NOT post a separate PR comment.
            8. If you hit the 6-min mark with 0 findings, write empty results JSON and exit cleanly — that is success.
            9. INTERACTION VALIDITY — clearing inputs: never clear a React/controlled input with an empty fill
               (agent-browser fill @ref with an empty value). An empty fill emits a single untrusted event that
               React's value-tracker ignores, so the field and any derived URL/results do NOT change — a false
               stale-state finding. To clear: focus (or click) the field, then 'press Control+a' and 'press Backspace',
               and wait for the debounce before asserting URL/state/results. Prefer 'type' over 'fill' for entering text.
            10. INTERACTION VALIDITY — click/navigation: before reporting a click or navigation failure, run
               'scrollintoview @ref', wait for layout to settle, take a fresh snapshot for a current ref, and click that.
               If it still does not navigate, confirm the trusted event targeted the intended element (not <html> or an
               overlay from a layout shift / off-screen coordinate). If the target was wrong, classify it as a driver/harness
               miss, NOT an app bug."
        timeout-minutes: 10

      - name: Upload dogfood shard artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dogfood-findings-${{ matrix.shard }}
          path: |
            dogfood-output/
            dogfood-findings-${{ matrix.shard }}.json
            dogfood-results.json
          retention-days: 7
          if-no-files-found: ignore

  # dogfood-aggregate: single job that runs after all dogfood shards complete.
  # Downloads all dogfood-findings-*.json artifacts, dedupes by fingerprint,
  # and files GitHub issues for unique pre-existing findings not yet tracked.
  dogfood-aggregate:
    needs: [gate-check, dogfood-plan, dogfood]
    if: always() && needs.gate-check.outputs.should_run == 'true' && needs.dogfood-plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download all dogfood findings artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dogfood-findings-*
          merge-multiple: true
        continue-on-error: true

      - name: Deduplicate findings and file GitHub issues
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, glob, subprocess, sys

          repo = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']

          # Load all findings files
          findings_files = glob.glob('dogfood-findings-*.json')
          print(f"Found findings files: {findings_files}")

          all_findings = []
          seen_fps = set()

          for fpath in sorted(findings_files):
              try:
                  with open(fpath) as f:
                      data = json.load(f)
                  for finding in data.get('findings', []):
                      fp = finding.get('fingerprint', '')
                      if not fp:
                          continue
                      if fp in seen_fps:
                          print(f"  [dedup] Skipping duplicate fingerprint {fp}: {finding.get('title')}")
                          continue
                      seen_fps.add(fp)
                      all_findings.append(finding)
              except Exception as e:
                  print(f"  [warn] Could not parse {fpath}: {e}")

          print(f"Total unique findings after dedup: {len(all_findings)}")

          # Separate PR-caused vs pre-existing
          preexisting = [f for f in all_findings if f.get('classification') == 'pre-existing']
          pr_caused = [f for f in all_findings if f.get('classification') == 'pr-caused']

          print(f"  PR-caused: {len(pr_caused)}, Pre-existing: {len(preexisting)}")

          # For each pre-existing finding: check if a GitHub issue already exists
          # with the fingerprint marker in its body, then file if absent.
          filed = 0
          skipped = 0
          for finding in preexisting:
              fp = finding['fingerprint']
              marker = f"<!-- dogfood-fp:{fp} -->"

              # Search for existing open issues with this fingerprint marker
              result = subprocess.run(
                  ['gh', 'issue', 'list', '--repo', repo, '--state', 'open',
                   '--search', f'dogfood-fp:{fp}', '--json', 'number,title', '--limit', '5'],
                  capture_output=True, text=True
              )
              existing_issues = []
              if result.returncode == 0 and result.stdout.strip():
                  try:
                      existing_issues = json.loads(result.stdout)
                  except Exception:
                      pass

              if existing_issues:
                  print(f"  [skip] Issue already exists for fp={fp}: #{existing_issues[0]['number']} {existing_issues[0]['title']}")
                  skipped += 1
                  continue

              # File a new GitHub issue
              severity = finding.get('severity', 'medium')
              title = f"[QA Dogfood] {finding.get('title', 'Untitled issue')}"
              body = f"""{marker}

          **Severity**: {severity}
          **Page**: {finding.get('page_url', 'unknown')}
          **Classification**: Pre-existing (not caused by the triggering PR)

          ## Description

          {finding.get('description', 'No description provided.')}

          ---
          *Filed automatically by the QA dogfood pipeline (PR #{pr_number}).*
          *Fingerprint: `{fp}`*
          """

              cmd = ['gh', 'issue', 'create',
                     '--repo', repo,
                     '--title', title,
                     '--body', body,
                     '--label', 'bug']
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, check=True)
                  print(f"  [filed] {title} -> {result.stdout.strip()}")
                  filed += 1
              except subprocess.CalledProcessError as e:
                  print(f"  [error] Failed to file issue: {e.stderr}")

          # Write aggregated summary for verdict job
          critical_count = sum(1 for f in pr_caused if f.get('severity') == 'critical')
          high_count = sum(1 for f in pr_caused if f.get('severity') == 'high')
          summary = {
              'total': len(all_findings),
              'critical': critical_count,
              'high': high_count,
              'medium': sum(1 for f in pr_caused if f.get('severity') == 'medium'),
              'low': sum(1 for f in pr_caused if f.get('severity') == 'low'),
              'preexisting': len(preexisting),
              'preexisting_filed': filed,
              'preexisting_skipped': skipped,
              'blocking': critical_count > 0 or high_count > 0,
          }
          with open('dogfood-results.json', 'w') as f:
              json.dump(summary, f, indent=2)
          print(f"\nSummary: {json.dumps(summary)}")
          PYEOF

      - name: Upload aggregated dogfood results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dogfood-results
          path: dogfood-results.json
          retention-days: 7
          if-no-files-found: ignore

  verdict:
    needs: [gate-check, qa-execution, dogfood-plan, dogfood-aggregate]
    if: always() && needs.gate-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download QA results (all shards)
        uses: actions/download-artifact@v7
        with:
          # Pull every per-shard artifact (qa-execution-results-public,
          # qa-execution-results-auth, ...) into the same directory so
          # the aggregator can glob qa-results-*.json.
          pattern: qa-execution-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Download dogfood aggregated results
        uses: actions/download-artifact@v7
        with:
          name: dogfood-results
        continue-on-error: true

      - name: Evaluate and set commit status
        uses: actions/github-script@v8
        env:
          HEAD_SHA: ${{ needs.gate-check.outputs.head_sha }}
          PR_NUMBER: ${{ needs.gate-check.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          QA_EXEC_RESULT: ${{ needs.qa-execution.result }}
          DOGFOOD_RESULT: ${{ needs.dogfood-aggregate.result }}
          DOGFOOD_SKIPPED: ${{ needs.dogfood-plan.outputs.should_run != 'true' }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.HEAD_SHA;
            const execResult = process.env.QA_EXEC_RESULT;
            const dogfoodResult = process.env.DOGFOOD_RESULT;
            const dogfoodSkipped = process.env.DOGFOOD_SKIPPED === 'true';

            // dogfood-aggregate is 'skipped' when dogfood-plan emitted should_run=false
            // (CI-only PR with no changed UI pages). That is not a failure.
            const dogfoodFailed = !dogfoodSkipped && dogfoodResult === 'failure';
            const jobsFailed = execResult === 'failure' || dogfoodFailed;

            let criticalCount = 0;
            let highCount = 0;

            // Aggregate qa-results-*.json from all sharded qa-execution jobs
            // (qa-results-public.json, qa-results-auth.json, ...). A missing
            // file means that shard didn't upload — counted as exec failure
            // already via QA_EXEC_RESULT, so we silently skip here.
            try {
              const shardFiles = fs.readdirSync('.').filter(f =>
                /^qa-results-.+\.json$/.test(f)
              );
              if (shardFiles.length === 0) {
                console.log('No qa-results-*.json files found from sharded jobs');
              }
              for (const file of shardFiles) {
                try {
                  const r = JSON.parse(fs.readFileSync(file, 'utf8'));
                  for (const s of (r.scenarios || [])) {
                    if (s.result === 'FAIL') {
                      if (s.severity?.toLowerCase() === 'critical') criticalCount++;
                      if (s.severity?.toLowerCase() === 'high') highCount++;
                    }
                  }
                } catch (e) {
                  console.log(`Could not parse ${file}: ${e.message}`);
                }
              }
            } catch (e) {
              console.log('Could not enumerate qa-results-*.json: ' + e.message);
            }

            // Read aggregated dogfood results (produced by dogfood-aggregate job)
            try {
              const dogfoodResults = JSON.parse(fs.readFileSync('dogfood-results.json', 'utf8'));
              criticalCount += (dogfoodResults.critical || 0);
              highCount += (dogfoodResults.high || 0);
            } catch (e) {
              console.log('Could not parse dogfood-results.json: ' + e.message);
            }

            const hasBlockingIssues = criticalCount > 0 || highCount > 0 || jobsFailed;
            const state = hasBlockingIssues ? 'failure' : 'success';
            let description;
            if (jobsFailed) {
              const failed = [
                execResult === 'failure' ? 'QA Execution' : null,
                dogfoodFailed ? 'Dogfood' : null
              ].filter(Boolean).join(', ');
              description = `${failed} failed — check workflow logs`;
            } else if (criticalCount > 0 || highCount > 0) {
              description = `${criticalCount} critical, ${highCount} high issues found`;
            } else {
              description = 'No critical/high issues found';
            }

            console.log(`Verdict: ${state} — ${description}`);

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state,
              description,
              context: 'qa-pipeline',
              target_url: `https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID}`
            });

            // Update the single consolidated pipeline comment with final verdict
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const icon = (r, skipped) => {
              if (skipped) return '⏭️ Skipped (no UI changes)';
              return r === 'success' ? '✅ Done' : r === 'skipped' ? '⏭️ Skipped' : '❌ Failed';
            };
            const verdictIcon = hasBlockingIssues ? '❌' : '✅';
            const verdictText = hasBlockingIssues ? `FAIL — ${description}` : 'PASS — no blocking issues';
            const marker = '<!-- qa-pipeline-status -->';

            const { data: cmts } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100
            });
            const pc = cmts.find(c => c.body.includes(marker));
            if (pc) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: pc.id,
                body: [
                  marker,
                  '## QA Pipeline',
                  '',
                  '| Stage | Status |',
                  '|-------|--------|',
                  '| QA Plan | ✅ Done |',
                  '| Build | ✅ Done |',
                  `| QA Execution | ${icon(execResult, false)} |`,
                  `| Dogfood | ${icon(dogfoodResult, dogfoodSkipped)} |`,
                  `| **Verdict** | **${verdictIcon} ${verdictText}** |`,
                  '',
                  `[View workflow run](https://github.com/${owner}/${repo}/actions/runs/${process.env.RUN_ID})`
                ].join('\n')
              });
            }

            if (hasBlockingIssues) {
              core.setFailed(`QA Pipeline FAILED: ${description}`);
            }
