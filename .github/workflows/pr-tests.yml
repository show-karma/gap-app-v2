name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**'] # Run on PRs targeting any branch
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'
  # Post-merge guard: two individually-green PRs can still combine red on
  # main (a semantic merge race). Branch protection cannot catch this, so we
  # re-run the full suite on every push to main and file/update a tracking
  # issue if the baseline goes red — the fastest signal short of a merge queue.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # PRs cancel in-progress runs per PR; pushes to main are keyed by SHA so a
  # post-merge baseline run is never cancelled by a later push.
  group: pr-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Step 1: determine test scope ────────────────────────────────────────────
  # Fast pre-job (<30s): counts changed source files and decides whether to run
  # only affected tests ("changed" mode, 1 shard) or the full suite ("full"
  # mode, 2 shards). Config-file changes always force full mode.
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      shard_count: ${{ steps.detect.outputs.shard_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect test scope
        id: detect
        run: |
          # Post-merge runs on `main` always execute the full suite (2 shards):
          # there is no PR base to diff against, and the whole point of the
          # push trigger is to catch a red baseline regardless of what changed.
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "push event on main — forcing full mode"
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "shard_count=2" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"

          # All changed TS/TSX source files (including test files — they affect scope)
          CHANGED_FILES=$(git diff --name-only "${BASE}...HEAD" -- '*.ts' '*.tsx' 2>/dev/null || echo "")
          CHANGED_COUNT=$(echo "${CHANGED_FILES}" | grep -c '.' || true)
          # grep -c returns 1 for empty input, so normalise:
          [ -z "${CHANGED_FILES}" ] && CHANGED_COUNT=0

          echo "Changed TS/TSX files: ${CHANGED_COUNT}"
          echo "${CHANGED_FILES}"

          # Config files that invalidate the incremental "changed" mode
          CONFIG_CHANGED=$(git diff --name-only "${BASE}...HEAD" -- \
            'vitest.config.*' \
            'tsconfig.json' \
            'package.json' \
            'pnpm-lock.yaml' \
            '.github/workflows/pr-tests.yml' \
          2>/dev/null || echo "")

          if [ -n "${CONFIG_CHANGED}" ]; then
            echo "Config files changed — forcing full mode:"
            echo "${CONFIG_CHANGED}"
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "shard_count=2" >> "$GITHUB_OUTPUT"
          elif [ "${CHANGED_COUNT}" -le 30 ]; then
            echo "mode=changed" >> "$GITHUB_OUTPUT"
            echo "shard_count=1" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "shard_count=2" >> "$GITHUB_OUTPUT"
          fi

  # ── Step 2: run tests (matrix of 1 or 2 shards) ─────────────────────────────
  test:
    needs: [scope]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.scope.outputs.shard_count == '2' && '[1,2]' || '[1]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # changed mode needs history to resolve the base SHA
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Vite/vitest transform cache — speeds up cold-start by reusing
      # transformed module graph across runs. Keyed on lockfile + source
      # hash so dep or code changes invalidate cleanly.
      - name: Cache vitest transform
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            node_modules/.cache/vitest
          key: ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '!node_modules/**', '!.next/**') }}
          restore-keys: |
            ${{ runner.os }}-vitest-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vitest-

      # changed mode: only test files affected by this PR's diff.
      # --passWithNoTests guards against "no tests found" exit 1 (e.g. docs-only PRs
      # that slip past paths-ignore because they also touch a .ts file).
      - name: Run tests (changed mode)
        id: tests
        if: needs.scope.outputs.mode == 'changed'
        # No continue-on-error: a red test must fail the job. The aggregated
        # `report` check is what should be marked required on `main`.
        run: |
          pnpm run test -- \
            --reporter=dot \
            --changed=${{ github.event.pull_request.base.sha }} \
            --passWithNoTests
        env:
          NODE_ENV: test
          NODE_OPTIONS: --max-old-space-size=8192

      # full mode: run the entire suite split across N shards.
      - name: Run tests (full mode, shard ${{ matrix.shard }}/2)
        id: tests_full
        if: needs.scope.outputs.mode == 'full'
        run: |
          pnpm run test -- \
            --reporter=dot \
            --shard=${{ matrix.shard }}/2
        env:
          NODE_ENV: test
          NODE_OPTIONS: --max-old-space-size=8192

      # Upload a tiny outcome artifact so the report job can aggregate across
      # shards. Matrix job outputs only return the LAST shard's value, so
      # artifacts are the reliable cross-shard signal.
      - name: Upload shard outcome
        if: always()
        run: |
          # Prefer the changed-mode step; fall back to the full-mode step.
          OUTCOME="${{ steps.tests.outcome }}"
          [ -z "${OUTCOME}" ] || [ "${OUTCOME}" = "skipped" ] && OUTCOME="${{ steps.tests_full.outcome }}"
          echo "${OUTCOME}" > /tmp/shard-${{ matrix.shard }}-outcome.txt

      - name: Upload shard outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-outcome
          path: /tmp/shard-${{ matrix.shard }}-outcome.txt
          retention-days: 1

  # ── Step 3 & 4: aggregate shard outcomes, gate the merge, report ────────────
  # This job produces the single stable check name ("report") that is the same
  # whether the run used 1 shard (changed mode) or 2 (full mode), which is what
  # should be marked as the REQUIRED status check on `main`. It fails the build
  # (core.setFailed) whenever any shard was not green — that is the hard gate.
  report:
    if: always()
    needs: [scope, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all shard outcome artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*-outcome
          path: /tmp/outcomes
          merge-multiple: true

      - name: Aggregate, report, and gate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const outcomesDir = '/tmp/outcomes';
            const mode = '${{ needs.scope.outputs.mode }}';
            const shardCount = parseInt('${{ needs.scope.outputs.shard_count }}', 10);

            // Read all shard outcome files; if any is not 'success' → failed.
            // Fewer outcome files than expected shards means a test job never
            // produced an outcome (runner loss, crash, cancellation, failed
            // upload) — treat that as a failure too, so the gate never
            // silently passes on a partial result.
            let passed = true;
            try {
              const files = fs.readdirSync(outcomesDir);
              if (!Number.isInteger(shardCount) || shardCount < 1 || files.length < shardCount) {
                passed = false;
              }
              for (const file of files) {
                const content = fs.readFileSync(path.join(outcomesDir, file), 'utf8').trim();
                if (content !== 'success') {
                  passed = false;
                  break;
                }
              }
            } catch (e) {
              passed = false;
            }

            const modeLabel = mode === 'changed'
              ? '`changed` (affected files only)'
              : `\`full\` (${shardCount} shards)`;

            // ── PR event: post/update the test-result comment ──────────────
            if (context.eventName === 'pull_request') {
              const marker = '<!-- pr-tests-report -->';
              const body = passed
                ? `${marker}\n## ✅ All Tests Passed!\n\nRan in **${modeLabel}** mode.\n\n---\n*Automated test report*`
                : `${marker}\n## ❌ Tests Failed — merge blocked\n\nRan in **${modeLabel}** mode. One or more test files failed; this **blocks merge** (the \`report\` check is required on \`main\`).\n\nReproduce locally with \`pnpm test\` (or \`pnpm test:unit\`), then re-run only the affected files. If the failure was introduced by a previously merged PR rather than your change (\`changed\` mode re-runs co-imported modules), say so on the PR and escalate — do **not** force-merge past a red gate.\n\n---\n*Automated test report*`;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

            // ── push-to-main event: file/update a tracking issue on red ────
            // No PR to comment on; instead open (or update) a single tracking
            // issue so a red baseline is loud and attributable. On green, close
            // any open tracker so the signal stays accurate.
            if (context.eventName === 'push') {
              const issueMarker = '<!-- main-baseline-red -->';
              const issueTitle = 'main test baseline is red';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'ci',
                per_page: 100,
              });
              const tracker = openIssues.find(i => i.body && i.body.includes(issueMarker));

              if (!passed) {
                const issueBody = `${issueMarker}\nThe full unit suite failed on a push to \`main\` (commit \`${context.sha}\`).\n\nRan in **${modeLabel}** mode. Logs: ${runUrl}\n\nThis is a post-merge baseline regression — likely a semantic merge race between two individually-green PRs. Fix forward or revert the offending merge, then push to clear this issue.\n\nReproduce locally with \`pnpm test\`.`;
                if (tracker) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: tracker.number,
                    body: `Still red on \`${context.sha}\`. Logs: ${runUrl}`,
                  });
                } else {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: issueBody,
                    labels: ['ci', 'bug'],
                  });
                }
              } else if (tracker) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: tracker.number,
                  body: `Baseline green again on \`${context.sha}\`. Closing. Logs: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: tracker.number,
                  state: 'closed',
                });
              }
            }

            // ── Hard gate: fail this job (and thus the required check) on red ─
            if (!passed) {
              core.setFailed('Unit tests failed — see logs. This blocks merge.');
            }
