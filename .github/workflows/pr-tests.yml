name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**'] # Run on PRs targeting any branch
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'
  # Post-merge guard: two individually-green PRs can still combine red on
  # main (a semantic merge race). Branch protection cannot catch this, so we
  # re-run the full suite on every push to main and file/update a tracking
  # issue if the baseline goes red — the fastest signal short of a merge queue.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # PRs cancel in-progress runs per PR; pushes to main are keyed by SHA so a
  # post-merge baseline run is never cancelled by a later push.
  group: pr-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The full suite always runs, split across a fixed number of shards. The
# previous "changed" mode (vitest --changed) was dropped: the transitive
# import graph pulled in most of the suite anyway (~8 min on one runner),
# so a sharded full run is both faster wall-clock and a stronger signal.
#
# Shard count is 6 rather than 4: the jsdom + axe accessibility suites are
# memory-heavy, and with only four shards a single shard could accumulate
# enough of them to push a runner past its RSS limit and get OOM-killed
# (crash with no test failures). More, thinner shards keep per-shard peak
# memory down while also improving wall-clock through extra parallelism.
env:
  SHARD_COUNT: 6

jobs:
  # ── Step 1: run tests (6 shards) ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    # Raised from 10: --maxWorkers=1 runs each shard's files sequentially to
    # cap peak memory, which is slower per shard than the old parallel run.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }})
        id: tests
        # No continue-on-error: a red test must fail the job. The aggregated
        # `report` check is what should be marked required on `main`.
        #
        # Invoke vitest directly: `pnpm run test -- <flags>` forwards the
        # literal `--` to vitest, which then parses the flags as test-name
        # filters — silently running the whole suite unsharded.
        # OOM background: the jsdom + axe suites build large JS-heap structures.
        # With --max-old-space-size=8192 on a 16 GB runner V8 had no reason to
        # GC until ~8 GB, so a shard's heap plus external memory accumulated
        # until the OS killed the worker (a crash with no test failures, no V8
        # "heap limit" line). Two changes bound it: a 6144 MB heap cap makes V8
        # collect aggressively so RSS stays well under the runner limit, and
        # --maxWorkers=1 keeps a single file's heap on the shared thread pool at
        # a time (concurrent heavy files would otherwise share, then blow, that
        # cap). Combined with the six-way split and the render-once homepage
        # a11y suite, shards stay comfortably in memory.
        run: |
          pnpm exec vitest run --project unit \
            --reporter=dot \
            --maxWorkers=1 \
            --shard=${{ matrix.shard }}/${{ env.SHARD_COUNT }}
        env:
          NODE_ENV: test
          NODE_OPTIONS: --max-old-space-size=6144

      # Upload a tiny outcome artifact so the report job can aggregate across
      # shards. Matrix job outputs only return the LAST shard's value, so
      # artifacts are the reliable cross-shard signal.
      - name: Upload shard outcome
        if: always()
        run: echo "${{ steps.tests.outcome }}" > /tmp/shard-${{ matrix.shard }}-outcome.txt

      - name: Upload shard outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-outcome
          path: /tmp/shard-${{ matrix.shard }}-outcome.txt
          retention-days: 1

  # ── Step 2: aggregate shard outcomes, gate the merge, report ────────────────
  # This job produces the single stable check name ("report") that should be
  # marked as the REQUIRED status check on `main`. It fails the build
  # (core.setFailed) whenever any shard was not green — that is the hard gate.
  report:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all shard outcome artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*-outcome
          path: /tmp/outcomes
          merge-multiple: true

      - name: Aggregate, report, and gate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const outcomesDir = '/tmp/outcomes';
            const shardCount = parseInt(process.env.SHARD_COUNT, 10);

            // Read all shard outcome files; if any is not 'success' → failed.
            // Fewer outcome files than expected shards means a test job never
            // produced an outcome (runner loss, crash, cancellation, failed
            // upload) — treat that as a failure too, so the gate never
            // silently passes on a partial result.
            let passed = true;
            try {
              const files = fs.readdirSync(outcomesDir);
              if (!Number.isInteger(shardCount) || shardCount < 1 || files.length < shardCount) {
                passed = false;
              }
              for (const file of files) {
                const content = fs.readFileSync(path.join(outcomesDir, file), 'utf8').trim();
                if (content !== 'success') {
                  passed = false;
                  break;
                }
              }
            } catch (e) {
              passed = false;
            }

            const modeLabel = `\`full\` (${shardCount} shards)`;

            // ── PR event: post/update the test-result comment ──────────────
            if (context.eventName === 'pull_request') {
              const marker = '<!-- pr-tests-report -->';
              const body = passed
                ? `${marker}\n## ✅ All Tests Passed!\n\nRan in **${modeLabel}** mode.\n\n---\n*Automated test report*`
                : `${marker}\n## ❌ Tests Failed — merge blocked\n\nRan in **${modeLabel}** mode. One or more test files failed; this **blocks merge** (the \`report\` check is required on \`main\`).\n\nReproduce locally with \`pnpm test\` (or \`pnpm test:unit\`), then re-run only the affected files. If the failure was introduced by a previously merged PR rather than your change, say so on the PR and escalate — do **not** force-merge past a red gate.\n\n---\n*Automated test report*`;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

            // ── push-to-main event: file/update a tracking issue on red ────
            // No PR to comment on; instead open (or update) a single tracking
            // issue so a red baseline is loud and attributable. On green, close
            // any open tracker so the signal stays accurate.
            if (context.eventName === 'push') {
              const issueMarker = '<!-- main-baseline-red -->';
              const issueTitle = 'main test baseline is red';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'ci',
                per_page: 100,
              });
              const tracker = openIssues.find(i => i.body && i.body.includes(issueMarker));

              if (!passed) {
                const issueBody = `${issueMarker}\nThe full unit suite failed on a push to \`main\` (commit \`${context.sha}\`).\n\nRan in **${modeLabel}** mode. Logs: ${runUrl}\n\nThis is a post-merge baseline regression — likely a semantic merge race between two individually-green PRs. Fix forward or revert the offending merge, then push to clear this issue.\n\nReproduce locally with \`pnpm test\`.`;
                if (tracker) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: tracker.number,
                    body: `Still red on \`${context.sha}\`. Logs: ${runUrl}`,
                  });
                } else {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: issueBody,
                    labels: ['ci', 'bug'],
                  });
                }
              } else if (tracker) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: tracker.number,
                  body: `Baseline green again on \`${context.sha}\`. Closing. Logs: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: tracker.number,
                  state: 'closed',
                });
              }
            }

            // ── Hard gate: fail this job (and thus the required check) on red ─
            if (!passed) {
              core.setFailed('Unit tests failed — see logs. This blocks merge.');
            }
