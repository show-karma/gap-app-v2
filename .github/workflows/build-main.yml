name: Build main bundle

# Builds the production standalone bundle once per push to main and publishes
# it as an artifact, so downstream workflows (nightly E2E today; anything
# SHA-pinned tomorrow) can skip their own ~5-min Next.js build. Also keeps the
# Next.js incremental cache warm on the default branch, which every PR's
# cache restore-keys fall back to.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Only the newest main build matters — cancel superseded ones so busy
  # merge days don't stack billable builds.
  group: build-main
  cancel-in-progress: true

env:
  NEXT_PUBLIC_E2E_AUTH_BYPASS: true
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
  NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID }}
  NEXT_PUBLIC_GAP_INDEXER_URL: https://gapstagapi.karmahq.xyz

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '!node_modules/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - name: Pack standalone bundle into tarball
        run: tar --zstd -cf next-build.tar.zst .next/standalone

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: next-standalone-main
          path: next-build.tar.zst
          retention-days: 2
          if-no-files-found: error
