name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to comment results back to'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'  # Nightly at 4 AM UTC

env:
  NEXT_PUBLIC_E2E_AUTH_BYPASS: true
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
  NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID }}
  NEXT_PUBLIC_GAP_INDEXER_URL: https://gapstagapi.karmahq.xyz

jobs:
  # Build once, test in parallel shards. The Next.js build (~4 min) used to
  # run inline before a single ~11-min Playwright pass; splitting them halves
  # the wall-clock and lets shards start from a prebuilt standalone bundle.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Reuse the bundle that build-main.yml already produced for this exact
      # SHA (every push to main builds one). Hitting it turns this job into
      # a ~1-min artifact relay; missing it (build-main cancelled/failed, or
      # running on a non-main ref) falls back to building here.
      - name: Fetch prebuilt bundle from build-main
        id: prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow build-main.yml --status success --limit 20 \
            --json databaseId,headSha \
            --jq "[.[] | select(.headSha == \"$GITHUB_SHA\")][0].databaseId" || true)
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            if gh run download "$RUN_ID" -n next-standalone-main; then
              echo "Reusing bundle from build-main run $RUN_ID"
              echo "hit=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Artifact download failed (likely expired) — building locally"
          else
            echo "No successful build-main run for $GITHUB_SHA — building locally"
          fi
          echo "hit=false" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.prebuilt.outputs.hit != 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        if: steps.prebuilt.outputs.hit != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.prebuilt.outputs.hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        if: steps.prebuilt.outputs.hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '!node_modules/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build application
        if: steps.prebuilt.outputs.hit != 'true'
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Assemble standalone bundle
        if: steps.prebuilt.outputs.hit != 'true'
        # Standalone output is self-contained (server.js + traced
        # node_modules) but doesn't auto-copy public/ or .next/static/.
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - name: Pack standalone bundle into tarball
        if: steps.prebuilt.outputs.hit != 'true'
        # Tarball sidesteps upload-artifact's per-file name validation
        # (Turbopack emits chunks with `:` in the name) and is much smaller.
        run: tar --zstd -cf next-build.tar.zst .next/standalone

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: e2e-build
          path: next-build.tar.zst
          retention-days: 1
          if-no-files-found: error

  playwright:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the downloaded browser binaries (~150MB Chromium) so each of the
      # 4 shards doesn't re-download them. The apt system deps (--with-deps)
      # can't be cached and must be installed every run, but `install-deps`
      # alone is ~10-15s vs ~40-60s for a full browser download+install.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Download prebuilt bundle
        uses: actions/download-artifact@v7
        with:
          name: e2e-build

      - name: Unpack standalone bundle
        run: tar --zstd -xf next-build.tar.zst

      - name: Start local server
        # Playwright's webServer config reuses any server already listening
        # on :3000, so booting the standalone bundle here skips `pnpm start`.
        run: |
          node .next/standalone/server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null && exit 0
            sleep 1
          done
          echo "server failed to start" && exit 1
        env:
          HOSTNAME: 0.0.0.0
          PORT: '3000'

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm exec playwright test --config e2e/playwright.config.ts --project=chromium --shard=${{ matrix.shard }}/4
        continue-on-error: true
        env:
          CI: true

      # always(), not failure(): the test step above has continue-on-error,
      # so the job never reaches `failure` status and these uploads would be
      # dead code under `if: failure()`. With `if-no-files-found: ignore` they
      # are cheap on green runs and actually capture artifacts on red ones.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-screenshots-shard-${{ matrix.shard }}
          path: e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

  report:
    # Only comment when triggered manually with an explicit PR number.
    # workflow_dispatch has no `context.issue.number`, so commenting without
    # a PR number would fail.
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
    needs: [playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Comment PR with E2E test results
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const playwrightStatus = '${{ needs.playwright.result }}';
            const allPassed = playwrightStatus === 'success';
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const marker = '<!-- e2e-tests-report -->';

            const icon = (status) => status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';

            const body = allPassed
              ? `${marker}\n## ✅ E2E Tests Passed!\n\nAll Playwright end-to-end tests completed successfully.\n\n| Suite | Status |\n|-------|--------|\n| Playwright | ${icon(playwrightStatus)} ${playwrightStatus} |`
              : `${marker}\n## ❌ E2E Tests Failed\n\nSome E2E tests failed. Check the workflow logs and artifacts for details.\n\n| Suite | Status |\n|-------|--------|\n| Playwright | ${icon(playwrightStatus)} ${playwrightStatus} |\n\n**Artifacts available on failure:** report + traces (Playwright)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const e2eComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (e2eComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: e2eComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
